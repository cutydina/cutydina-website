{{ define "content" }}
{{- if and .FirstSection (eq .FirstSection.Section "portfolio") -}}
  <div class="col-12 p-0 cd-portfolio-list-shell">
    {{- partial "cd/portfolio-grid-paginated" . -}}
  </div>
{{- else -}}
  <div class="{{ if default true .Params.sidebar }}col-xxl-8{{ else }}col-xxl-12{{ end }}">
    {{ partial "list" . }}
  </div>
  {{- partial "sidebar" . -}}
{{- end -}}
{{ end }}
