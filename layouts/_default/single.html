{{ define "content" }}
{{- $showSidebar := default false .Params.sidebar -}}
<div class="content-posts {{ if $showSidebar }}col-xxl-8{{ else }}col-xxl-12 content-posts-centered{{ end }}">
  <div class="container">
    {{- partial "post" . -}}
  </div>
</div>
{{- if $showSidebar }}
  {{- partial "sidebar" . -}}
{{- end }}
{{ end }}
