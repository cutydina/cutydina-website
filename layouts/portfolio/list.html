{{ define "content" }}
<div class="col-12 p-0">
  <div class="cd-home-content">
    <div class="cd-home-grid" role="list">
      {{- range .Paginator.Pages }}
        <a class="cd-home-card" href="{{ .RelPermalink }}" role="listitem" aria-label="{{ partial "helpers/title" . }}">
          <div class="cd-home-card-media">
            {{- partial "post/thumbnail" . -}}
          </div>
          <span class="cd-home-card-title">{{ partial "helpers/title" . }}</span>
        </a>
      {{- end }}
    </div>
    {{- partial "wrap-pagination" . }}
  </div>
</div>
{{ end }}
