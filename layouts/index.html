{{ define "content" }}
{{- $portfolioPages := where .Site.RegularPages "Section" "portfolio" -}}
{{- $portfolioPages = sort $portfolioPages "Date" "desc" -}}
<div class="col-12 p-0">
  <div class="cd-home-content">
    <div class="cd-home-grid" id="cd-grid" role="list">
      {{- range $i, $p := $portfolioPages }}
        <a class="cd-home-card{{ if ge $i 24 }} cd-card-hidden{{ end }}"
           href="{{ $p.RelPermalink }}" role="listitem" aria-label="{{ partial "helpers/title" $p }}">
          <div class="cd-home-card-media">
            {{- partial "post/thumbnail" $p -}}
          </div>
          <span class="cd-home-card-title">{{ partial "helpers/title" $p }}</span>
        </a>
      {{- end }}
    </div>

    <div id="cd-sentinel" style="height:1px"></div>

    <script>
    (function(){
      var grid     = document.getElementById('cd-grid');
      var sentinel = document.getElementById('cd-sentinel');
      if (!grid || !sentinel) return;

      var BATCH = 24;

      function revealNext() {
        var hidden = grid.querySelectorAll('.cd-card-hidden');
        if (!hidden.length) { observer.disconnect(); return; }
        var batch = Array.prototype.slice.call(hidden, 0, BATCH);
        batch.forEach(function(c){ c.classList.remove('cd-card-hidden'); });
      }

      var observer = new IntersectionObserver(function(entries){
        if (entries[0].isIntersecting) revealNext();
      }, { rootMargin: '300px' });

      observer.observe(sentinel);
    })();
    </script>
  </div>
</div>
{{ end }}
