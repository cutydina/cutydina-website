{{ define "content" }}
<div class="col error text-center my-4">
  <div class="error-icon mb-4"><img src="{{ "images/404-chibi.svg" | relURL }}" alt="404 Chibi" class="mb-4" /></div>
  <h1 class="error-title mb-4">{{ i18n "404_title" }}</h1>
  <div class="mb-4 error-info text-muted">{{ i18n "404_info" }}</div>
  <div class="mb-4 error-actions">
    <a class="error-action btn btn-sm btn-outline-primary" href="{{ strings.TrimPrefix "/" $.Site.LanguagePrefix | absURL }}">
      <i class="fas fa-fw fa-home me-1"></i>{{ i18n "home" }}
    </a>
  </div>
</div>
{{ end }}
