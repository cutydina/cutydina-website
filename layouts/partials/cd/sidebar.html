<div class="cd-left-sidebar flex-column text-start d-flex justify-content-between text-center">
  <div class="cd-home-brand-block text-center">
    <a href="{{ "" | relLangURL }}" aria-label="Inicio {{ .Site.Title }}">
      <img class="cd-home-logo" src="{{ "images/brand/logo_cutydina.png" | relURL }}" alt="{{ .Site.Title }}" loading="eager">
    </a>
    <p class="cd-home-tagline">Illustration, Animation, Children's Books, Videogames, Web Design, Comics and more.</p>
  </div>

  <!-- Desktop menu - hidden on mobile -->
  <nav class="cd-home-side-menu cd-desktop-only" aria-label="Main menu">
    {{- range .Site.Menus.sidebar }}
      <a class="cd-home-side-link" href="{{ .URL | relLangURL }}">{{ .Name }}</a>
    {{- end }}
  </nav>

  <!-- Desktop only elements -->
  <div class="cd-desktop-only">
    <a class="coffee-btn p-2 rounded-3" target="_blank" rel="noopener noreferrer" href="https://buymeacoffee.com/geraldinasierra"><i class="cd cd-icon-buymeacoffee"></i>Buy me a coffee</a>
  </div>

  <div class="hstack justify-content-center" id="social-net">
    <a href="https://vgen.co/cutydina/" target="_blank" rel="noopener noreferrer" title="VGen"><i class="cd cd-social-vgen"></i></a>
    <a href="https://play.google.com/store/apps/dev?id=5952639200520854445" target="_blank" rel="noopener noreferrer" title="GooglePlay"><i class="cd cd-social-googleplay"></i></a>
    <a href="https://www.linkedin.com/in/geraldinasierra/" target="_blank" rel="noopener noreferrer" title="LinkedIn"><i class="cd cd-social-linkedin"></i></a>
    <a href="https://bsky.app/profile/cutydina.com" target="_blank" rel="noopener noreferrer" title="Bluesky"><i class="cd cd-social-bluesky"></i></a>
    <a href="mailto:info@cutydina.com" title="Email"><i class="cd cd-social-email"></i></a>
  </div>

  <span class="cd-desktop-only">CutyDina © {{ now.Year }}</span>
    
</div>
